<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 670px;
    overflow: hidden;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .container {
    width: 1280px;
    height: 670px;
    background: linear-gradient(135deg, #1a237e 0%, #00695c 50%, #004d40 100%);
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 100px;
  }

  /* 装飾の円 */
  .circle1 {
    position: absolute;
    top: -120px;
    right: -80px;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: rgba(0, 230, 180, 0.08);
  }

  .circle2 {
    position: absolute;
    bottom: -80px;
    left: -60px;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background: rgba(0, 230, 180, 0.06);
  }

  /* 小さなドット装飾 */
  .dots {
    position: absolute;
    top: 60px;
    right: 100px;
    display: grid;
    grid-template-columns: repeat(4, 8px);
    gap: 12px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #00e6b4;
    opacity: 0.15;
  }

  .title {
    font-size: 48px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.4;
    letter-spacing: 0.02em;
    position: relative;
    z-index: 1;
  }

  .subtitle {
    font-size: 22px;
    font-weight: 400;
    color: #c8dcff;
    margin-top: 16px;
    position: relative;
    z-index: 1;
  }

  .accent-line {
    width: 60px;
    height: 4px;
    background: #00e6b4;
    margin-top: 32px;
    border-radius: 2px;
    position: relative;
    z-index: 1;
  }

  .author {
    position: absolute;
    bottom: 50px;
    left: 100px;
    font-size: 18px;
    font-weight: 400;
    color: #b4c8e6;
    z-index: 1;
  }

  /* 左下のアクセントライン */
  .bottom-line {
    position: absolute;
    bottom: 100px;
    left: 100px;
    width: 200px;
    height: 3px;
    background: #00e6b4;
    opacity: 0.3;
    border-radius: 2px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="circle1"></div>
  <div class="circle2"></div>
  <div class="dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
  <div class="title">AIと音声入力で、振り返りの体験が変わった話</div>
  
  <div class="accent-line"></div>
  <div class="bottom-line"></div>
  <div class="author">by はこてん</div>
</div>
</body>
</html>
